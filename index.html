  h+='<div class="slide" id="slide-orgullosamente" data-title="Orgullosamente Poli"><div class="sf" style="background:linear-gradient(135deg,#0F385A,#EC0677);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;padding:40px;position:relative">';
  h+='<img src="./public/img/brand/logo-poli.jpg" style="width:clamp(80px,12vw,160px);height:auto;margin-bottom:8px;filter:brightness(10);opacity:1;position:relative;">';
  h+='<div style="font-size:clamp(24px,3.6vw,48px);font-weight:900;color:white;letter-spacing:2px;line-height:1.05;position:relative">SOMOS DIFERENTES,<br><span style="color:#FBAF17">#SOMOS POLI.</span></div>';
  h+='<div style="color:rgba(255,255,255,0.75);font-size:clamp(11px,1.1vw,15px);line-height:1.7;max-width:500px;position:relative">Una institución universitaria que transforma vidas, genera impacto positivo y lidera la educación superior con excelencia, pasión y originalidad.</div>';
  h+='</div></div>';

  /* ===== MOUNT ===== */
  document.getElementById('main').insertAdjacentHTML('beforeend',h);

  /* ===== NAVIGATION ===== */
  var slideHistory=[];
  var currentSlide='slide-home';

  window.goTo=function(id){
    var el=document.getElementById('slide-'+id);
    if(!el)return;
    slideHistory.push(currentSlide);
    document.querySelectorAll('.slide.active').forEach(function(s){s.classList.remove('active');});
    el.classList.add('active');
    currentSlide='slide-'+id;
    updateNav();
  };
  window.goHome=function(){
    slideHistory=[];
    document.querySelectorAll('.slide.active').forEach(function(s){s.classList.remove('active');});
    document.getElementById('slide-home').classList.add('active');
    currentSlide='slide-home';
    updateNav();
  };
  window.goBack=function(){
    if(slideHistory.length===0){goHome();return;}
    var prev=slideHistory.pop();
    document.querySelectorAll('.slide.active').forEach(function(s){s.classList.remove('active');});
    document.getElementById(prev).classList.add('active');
    currentSlide=prev;
    updateNav();
  };
  function updateNav(){
    document.getElementById('btn-home').disabled=(currentSlide==='slide-home');
    document.getElementById('btn-back').disabled=(slideHistory.length===0);
  }
  window.togglePestel=function(btn){
    var clicked=btn.nextElementSibling;
    document.querySelectorAll('#slide-pestel .pestel-body').forEach(function(el){
      if(el!==clicked)el.style.display='none';
    });
    clicked.style.display=clicked.style.display==='none'?'block':'none';
  };
  window.toggleLogros=function(id){
    var el=document.getElementById(id);
    if(!el)return;
    var btn=el.previousElementSibling;
    el.style.display=el.style.display==='none'?'block':'none';
    if(btn)btn.querySelector('span:last-child').textContent=el.style.display==='none'?'▼':'▲';
  };
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape')goBack();
    if(e.key==='h'||e.key==='H')goHome();
  });

  /* ===== SET HOME TITLES ===== */
  if(cfg.nombre)document.getElementById('home-title').textContent=cfg.nombre;
  if(cfg.subtitulo)document.getElementById('home-subtitle').textContent=cfg.subtitulo;

})();
</script>

<script>
(function() {
  function waitForThree(cb) {
    if(window.THREE) cb();
    else setTimeout(function(){ waitForThree(cb); }, 50);
  }
  waitForThree(function() {
    var wrap = document.getElementById('esfera3d');
    if(!wrap) return;
    var W = wrap.clientWidth || 150;
    var H = wrap.clientHeight || 150;

    var scene    = new THREE.Scene();
    var camera   = new THREE.PerspectiveCamera(42, W/H, 0.1, 100);
    camera.position.z = 3.8;

    var renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    wrap.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 2.2));
    var dl = new THREE.DirectionalLight(0xffffff, 2.4);
    dl.position.set(4,5,6);
    scene.add(dl);
    var dl2 = new THREE.DirectionalLight(0xffffff, 1.2);
    dl2.position.set(-4,-2,4);
    scene.add(dl2);

    var grupo = new THREE.Group();
    scene.add(grupo);
    grupo.rotation.x = -0.18;

    var geo = new THREE.SphereGeometry(1.4, 128, 64);
    var mat = new THREE.MeshStandardMaterial({color:0xd0d0d0, roughness:0.22, metalness:0.35});
    grupo.add(new THREE.Mesh(geo, mat));

    var geoB = new THREE.SphereGeometry(1.42, 128, 64);
    var matB = new THREE.MeshPhysicalMaterial({
      color:0xffffff, transparent:true, opacity:0.14,
      roughness:0.04, metalness:0, clearcoat:1, clearcoatRoughness:0.04
    });
    grupo.add(new THREE.Mesh(geoB, matB));

    var loader = new THREE.TextureLoader();
    var texF = loader.load('./public/img/brand/sphere-front.png');
    texF.colorSpace = THREE.SRGBColorSpace;
    var discF = new THREE.Mesh(
      new THREE.CircleGeometry(0.92, 128),
      new THREE.MeshBasicMaterial({map:texF, transparent:true, side:THREE.DoubleSide})
    );
    discF.position.z = 1.42;
    grupo.add(discF);

    var texB = loader.load('./public/img/brand/sphere-back.png');
    texB.colorSpace = THREE.SRGBColorSpace;
    var discB = new THREE.Mesh(
      new THREE.CircleGeometry(0.80, 128),
      new THREE.MeshBasicMaterial({map:texB, transparent:true, side:THREE.DoubleSide})
    );
    discB.position.z = -1.42;
    discB.rotation.y = Math.PI;
    grupo.add(discB);

    var geoS = new THREE.CircleGeometry(1.3, 64);
    var matS = new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.15});
    var sombra = new THREE.Mesh(geoS, matS);
    sombra.rotation.x = -Math.PI/2;
    sombra.position.set(0, -1.75, -0.2);
    sombra.scale.set(1.4, 0.3, 1);
    scene.add(sombra);

    (function animar() {
      requestAnimationFrame(animar);
      grupo.rotation.y += 0.010;
      renderer.render(scene, camera);
    })();

    new ResizeObserver(function() {
      var w = wrap.clientWidth, h = wrap.clientHeight;
      camera.aspect = w/h;
      camera.updateProjectionMatrix();
      renderer.setSize(w,h);
    }).observe(wrap);
  });
})();
</script>
</div>
</body></html>
