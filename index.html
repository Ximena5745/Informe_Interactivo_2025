<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Informe de Cierre PDI 2025 — Planeación y Gestión Institucional</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="./data-bundle.js"></script>
<style>
/* === Reset === */
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f0f4f8;font-family:'Montserrat',sans-serif;overflow:hidden;height:100vh;display:flex;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(15,56,90,0.3);border-radius:4px;}

/* === Variables === */
:root{
  --navy:#0F385A;--cyan:#1FB2DE;--pink:#EC0677;
  --green:#A6CE38;--yellow:#FBAF17;--teal:#15BECE;
}

/* === Sidebar nav === */
#snav{position:fixed;left:0;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;padding:8px;background:rgba(15,56,90,0.95);backdrop-filter:blur(10px);border-radius:0 12px 12px 0;border:1px solid rgba(31,178,222,0.3);border-left:none;z-index:300;}
#snav button{background:rgba(31,178,222,0.15);border:1px solid rgba(31,178,222,0.4);color:white;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:0.95em;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
#snav button:hover{background:rgba(31,178,222,0.45);border-color:#1FB2DE;}
#snav button:disabled{opacity:0.2;cursor:default;}

/* === Layout === */
#main{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.slide{display:none;position:absolute;inset:0;align-items:center;justify-content:center;}
.slide.active{display:flex;animation:fi 0.3s ease;}
@keyframes fi{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
.sf{width:min(100vw,calc(100vh*16/9));height:100vh;max-height:100vh;position:relative;overflow:hidden;background:white;}

/* === Home buttons === */
.btn-nav{border:none;border-radius:10px;padding:10px 8px;cursor:pointer;font-family:inherit;font-weight:800;font-size:clamp(10px,0.9vw,13px);letter-spacing:0.3px;text-transform:uppercase;line-height:1.4;text-align:center;width:100%;flex:1;min-height:0;box-shadow:0 2px 8px rgba(0,0,0,0.15);transition:transform 0.15s;}
.btn-nav:hover{transform:scale(1.04);}

/* ===================================================================
   ESFERA: blanca, centro medido px=(316,325)=44%,44% en 721×735
   Banda scrolling con fondo BLANCO → movimiento visible sin efecto moneda
   =================================================================== */
.esfera{
  position:absolute;
  left:51.9%;top:47.9%;          /* centro px=(374,352) en 721×735 */
  transform:translate(-50%,-50%);
  width:28%;aspect-ratio:1/1;
  border-radius:50%;
  overflow:hidden;
  /* Gradiente base: blanco puro → gris claro → gris medio (efecto esférico 3D) */
  background:radial-gradient(circle at 38% 32%,#ffffff 0%,#f2eff2 38%,#d0cdd0 75%,#b8b5b8 100%);
  box-shadow:
    inset 0 -8px 18px rgba(0,30,80,0.1),
    inset 3px 3px 10px rgba(255,255,255,0.9),
    0 5px 18px rgba(0,0,0,0.18),
    0 0 0 2px rgba(255,255,255,0.95);
  z-index:3;
}
/* Banda de 3 caras que scrollea — es lo que da apariencia de esfera (no disco):
   el CONTENIDO se mueve bajo una luz FIJA = efecto esfera girando */
.esfera-banda{
  position:absolute;top:0;left:0;height:100%;
  width:300%;
  display:flex;
  animation:girar-esfera 8s linear infinite;
}
.esfera-cara{
  flex:1;height:100%;
  /* Igual al color interior del círculo de Comunidad.png: R=245 G=241 B=244 */
  background:#f5f1f4;
  overflow:hidden;
  position:relative;
}
/* Comunidad.png tiene fondo transparente — no necesita blend mode.
   Escala al 160% para que el círculo ocupe ~87% del diámetro de la esfera */
.cara-icon img{
  position:absolute;
  width:160%;height:auto;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
}
/* logo-poli.jpg es 1225×596 (muy landscape) — contain para ver completo,
   multiply elimina el fondo blanco del JPG */
.cara-logo img{
  position:absolute;
  width:88%;height:auto;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  mix-blend-mode:multiply;
}
/* Sombra de curvatura en bordes — FIJA, da la ilusión de profundidad esférica */
.esfera-curva{
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 50% 50%,transparent 36%,rgba(0,20,60,0.14) 58%,rgba(0,20,60,0.50) 82%,rgba(0,20,60,0.68) 100%),
    radial-gradient(ellipse 28% 100% at 0%   50%,rgba(0,20,60,0.18) 0%,transparent 100%),
    radial-gradient(ellipse 28% 100% at 100% 50%,rgba(0,20,60,0.10) 0%,transparent 100%),
    radial-gradient(ellipse 100% 22% at 50% 100%,rgba(0,20,60,0.18) 0%,transparent 100%);
  z-index:2;pointer-events:none;
}
/* Reflejo especular FIJO en arriba-izquierda — luz real no rota con la esfera */
.esfera-luz{
  position:absolute;
  width:32%;height:26%;
  top:7%;left:9%;
  border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,255,255,0.96) 0%,rgba(255,255,255,0.65) 35%,transparent 68%);
  pointer-events:none;z-index:4;
}
@keyframes girar-esfera{
  from{transform:translateX(0%)}
  to  {transform:translateX(-66.66%)}
}

/* === Animated bars === */
.bar-row{display:flex;align-items:center;gap:10px;margin:4px 0;}
.bar-label{font-size:0.65em;font-weight:800;color:#555;text-transform:uppercase;width:110px;flex-shrink:0;text-align:right;}
.bar-track{background:rgba(0,0,0,0.08);border-radius:8px;height:18px;overflow:hidden;flex:1;}
.bar-fill{height:100%;border-radius:8px;width:0%;transition:width 0.9s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;}
.bar-fill span{color:white;font-size:0.68em;font-weight:900;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,0.3);}

/* === Gauge row === */
.gauge-row{display:flex;justify-content:center;gap:24px;flex-shrink:0;border-bottom:2px solid #eef2f7;padding:16px 24px;background:white;}

/* === Dark slide header === */
.sh-dark{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:13px 22px;}
.sh-dark span.tt{color:white;font-weight:900;font-size:clamp(11px,1.6vw,21px);text-transform:uppercase;letter-spacing:1px;}

/* === Heatmap === */
.hm-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:5px;align-items:center;}
.hm-head{font-size:0.68em;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:0.5px;padding:6px 10px;text-align:center;border-radius:6px;}
.hm-name{font-size:0.78em;font-weight:800;color:var(--navy);padding:6px 8px;}
.hm-cell{border-radius:8px;padding:8px 6px;text-align:center;font-weight:900;font-size:0.85em;}

/* === Timeline === */
.tl-bar-wrap{display:flex;align-items:center;gap:8px;margin:3px 0;}
.tl-label{font-size:0.62em;font-weight:700;color:#555;width:180px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-track{flex:1;background:#eef2f7;border-radius:6px;height:14px;overflow:hidden;}
.tl-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;transition:width 0.8s ease;}
.tl-fill span{color:white;font-size:0.6em;font-weight:900;white-space:nowrap;}
.tl-pct{font-size:0.6em;font-weight:900;width:30px;text-align:right;flex-shrink:0;}
.toggle-btns{display:flex;gap:6px;margin-left:auto;}
.toggle-btns button{border:2px solid #ccc;background:white;color:#555;border-radius:8px;padding:5px 14px;cursor:pointer;font-family:inherit;font-weight:700;font-size:0.72em;transition:all 0.15s;}
.toggle-btns button.active{background:var(--navy);color:white;border-color:var(--navy);}

/* === Tarjetas Unidad animaciones === */
.card-unidad{animation:slideUpIn 0.5s ease-out backwards;}
.card-unidad:nth-child(1){animation-delay:0.1s;}
.card-unidad:nth-child(2){animation-delay:0.2s;}
.card-unidad:nth-child(3){animation-delay:0.3s;}
.card-unidad:nth-child(4){animation-delay:0.25s;}
.card-unidad:nth-child(5){animation-delay:0.35s;}
.card-unidad:nth-child(6){animation-delay:0.4s;}

@keyframes slideUpIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.card-unidad{cursor:pointer;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);}
.card-unidad:hover{transform:translateY(-8px) scale(1.05);box-shadow:0 16px 32px rgba(0,0,0,0.25)!important;}
.card-unidad:active{transform:translateY(-4px) scale(1.02);}

.card-unidad-pct{animation:subtlePulse 2s ease-in-out infinite;}
@keyframes subtlePulse{
  0%,100%{opacity:1;}
  50%{opacity:0.85;}
}

.obj-item{
  animation:objSlideIn 0.45s cubic-bezier(0.22,1,0.36,1) backwards;
  transition:transform 0.2s ease, filter 0.2s ease;
  cursor:default;
}
.obj-item:hover{
  transform:translateX(5px);
  filter:drop-shadow(0 3px 8px rgba(0,0,0,0.18));
}
.obj-item-left:hover{ transform:translateX(-5px); }
@keyframes objSlideIn{
  from{opacity:0;transform:translateY(14px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<div id="snav">
  <button id="btn-home" onclick="goHome()" disabled title="Inicio">🏠</button>
  <button id="btn-back" onclick="goBack()" disabled title="Volver">←</button>
</div>

<div id="main">

<!-- ===== HOME ===== -->
<div class="slide active" id="slide-home" data-title="Inicio">
<div class="sf" style="display:flex;flex-direction:column;overflow:hidden;">

  <div style="padding:10px 20px 8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;">
    <div style="text-align:center;">
      <div style="color:var(--navy);font-size:clamp(16px,2.2vw,30px);font-weight:900;text-transform:uppercase;letter-spacing:2px;" id="home-title">Informe de Cierre PDI 2025</div>
      <div style="color:var(--cyan);font-size:clamp(8px,0.78vw,11px);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:2px;" id="home-subtitle">Planeación y Gestión Institucional</div>
    </div>
    <img src="./public/img/brand/logo-poli.jpg" style="position:absolute;right:20px;top:50%;transform:translateY(-50%);height:54px;object-fit:contain;">
  </div>

  <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:10px;padding:4px 12px 8px;min-height:0;overflow:hidden;">

    <!-- LEFT: 3 buttons -->
    <div style="width:150px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;height:min(calc(100vh - 108px),460px);">
      <button onclick="goTo('ciclo')"   class="btn-nav" style="background:var(--pink);color:white;">Ciclo de la<br>Estrategia</button>
      <button onclick="goTo('avances')" class="btn-nav" style="background:var(--green);color:var(--navy);">Avance Líneas<br>Estratégicas</button>
      <button onclick="goTo('logros')"  class="btn-nav" style="background:var(--cyan);color:var(--navy);">Logros por<br>Línea Estratégica</button>
    </div>

    <!-- CENTER: flower diagram + esfera giratoria -->
    <div style="position:relative;height:min(calc(100vh - 108px),460px);aspect-ratio:721/735;flex-shrink:0;">
      <img src="./public/img/brand/lineas-estrategicas.jpg" style="width:100%;height:100%;">
      <!-- Círculo blanco cubre ícono original (centro medido px=(374,352)=51.9%×47.9%) -->
      <svg viewBox="0 0 721 735" style="position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;">
        <circle cx="374" cy="352" r="105" fill="white"/>
      </svg>
      <!-- Esfera: Comunidad (frente) → Logo Poli (dorso) → Comunidad (loop) -->
      <div class="esfera">
        <div class="esfera-banda">
          <div class="esfera-cara cara-icon"><img src="./PDI/Comunidad.png" alt="Comunidad Universitaria"></div>
          <div class="esfera-cara cara-logo"><img src="./public/img/brand/logo-poli.jpg" alt="Logo Poli"></div>
          <div class="esfera-cara cara-icon"><img src="./PDI/Comunidad.png" alt="Comunidad Universitaria"></div>
        </div>
        <div class="esfera-curva"></div>
        <div class="esfera-luz"></div>
      </div>
      <!-- Petales clickeables — coords escaladas a 721×735 -->
      <svg viewBox="0 0 721 735" style="position:absolute;inset:0;width:100%;height:100%;z-index:4;pointer-events:none;">
        <ellipse cx="72"  ry="180" cy="303" rx="59"  fill="rgba(0,0,0,0.001)" style="cursor:pointer;pointer-events:all" onclick="goTo('cal-avance')"/>
        <ellipse cx="611" ry="117" cy="236" rx="100" fill="rgba(0,0,0,0.001)" style="cursor:pointer;pointer-events:all" onclick="goTo('exp-avance')"/>
        <ellipse cx="193" ry="69"  cy="605" rx="103" fill="rgba(0,0,0,0.001)" style="cursor:pointer;pointer-events:all" onclick="goTo('edu-avance')"/>
        <ellipse cx="594" ry="105" cy="487" rx="95"  fill="rgba(0,0,0,0.001)" style="cursor:pointer;pointer-events:all" onclick="goTo('exp2-avance')"/>
        <ellipse cx="462" ry="200" cy="656" rx="86"  fill="rgba(0,0,0,0.001)" style="cursor:pointer;pointer-events:all" onclick="goTo('to-avance')"/>
        <ellipse cx="489" ry="200" cy="12"  rx="75"  fill="rgba(0,0,0,0.001)" style="cursor:pointer;pointer-events:all" onclick="goTo('sos-avance')"/>
      </svg>
    </div>

    <!-- RIGHT: 4 buttons -->
    <div style="width:150px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;height:min(calc(100vh - 108px),460px);">
      <button onclick="goTo('planes')"        class="btn-nav" style="background:var(--navy);color:white;">Planes Anuales<br>de Retos</button>
      <button onclick="goTo('proyectos-resumen')" class="btn-nav" style="background:#42F2F2;color:var(--navy);">Proyectos<br>Estratégicos</button>
      <button onclick="goTo('balance')"       class="btn-nav" style="background:var(--teal);color:var(--navy);">Balance<br>Institucional</button>
      <button onclick="goTo('orgullosamente')"class="btn-nav" style="background:var(--yellow);color:var(--navy);">Orgullosamente<br>Poli</button>
    </div>

  </div>
</div>
</div><!-- /HOME -->

</div><!-- /#main -->

<script>
(function () {
  var D = window.PDI_DATA;
  if (!D) {
    document.getElementById('main').innerHTML = '<div style="padding:40px;text-align:center"><h1>Error</h1><p>No se encontró data-bundle.js</p></div>';
    return;
  }

  /* ── datos ── */
  var cfg = {};
  (D.config || []).forEach(function (r) {
    if (r.seccion === 'general' || r.seccion === 'branding') cfg[r.clave] = r.valor;
  });
  var paleta = {};
  (D.config || []).forEach(function (r) {
    if (r.seccion === 'paleta') paleta[r.clave] = r.valor;
  });
  var avance   = D.avance    || [];
  var foda     = D.foda      || [];
  var pestel   = D.pestel    || [];
  var proy     = D.proyectos || [];
  var obj      = D.objetivos || [];
  var unidades = D.unidades  || [];

  var avMap = {};
  avance.forEach(function (a) { avMap[a.id] = a; });

  var colorMap = {
    calidad:        paleta.pink   || '#EC0677',
    educacion:      paleta.navy   || '#0F385A',
    expansion:      paleta.yellow || '#FBAF17',
    experiencia:    paleta.cyan   || '#1FB2DE',
    transformacion: paleta.teal   || '#15BECE',
    sostenibilidad: paleta.green  || '#A6CE38'
  };
  var lineNameMap = {
    calidad: 'Calidad',
    educacion: 'Educación para Toda la Vida',
    expansion: 'Expansión',
    experiencia: 'Experiencia',
    transformacion: 'Transformación Organizacional',
    sostenibilidad: 'Sostenibilidad'
  };

  var lineIds       = ['calidad','expansion','educacion','experiencia','transformacion','sostenibilidad'];
  var slideSuffixes = ['cal-avance','exp-avance','edu-avance','exp2-avance','to-avance','sos-avance'];
  var lineColors    = [
    paleta.pink   || '#EC0677',
    paleta.yellow || '#FBAF17',
    paleta.navy   || '#0F385A',
    paleta.cyan   || '#1FB2DE',
    paleta.teal   || '#15BECE',
    paleta.green  || '#A6CE38'
  ];
  var lineNames = [
    'Calidad','Expansión','Educación para Toda la Vida',
    'Experiencia','Transformación Organizacional','Sostenibilidad'
  ];

  /* ── helpers ── */
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function gauge(pct, color, label) {
    var c = Math.round(pct * 2.39);
    return '<svg viewBox="0 0 100 100" style="width:80px;height:80px">'
      + '<circle cx="50" cy="50" r="38" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="8"/>'
      + '<circle cx="50" cy="50" r="38" fill="none" stroke="'+esc(color)+'" stroke-width="8"'
      + ' stroke-dasharray="'+c+' 239" stroke-linecap="round" transform="rotate(-90 50 50)"/>'
      + '<text x="50" y="46" text-anchor="middle" font-size="18" font-weight="900" fill="#0F385A" font-family="Montserrat,sans-serif">'+pct+'%</text>'
      + '<text x="50" y="60" text-anchor="middle" font-size="8"  font-weight="700" fill="#666"   font-family="Montserrat,sans-serif">'+esc(label)+'</text>'
      + '</svg>';
  }
  function barRow(label, pct, color) {
    return '<div class="bar-row">'
      + '<div class="bar-label">'+esc(label)+'</div>'
      + '<div class="bar-track"><div class="bar-fill" data-pct="'+pct+'" style="background:'+esc(color)+'"><span>'+pct+'%</span></div></div>'
      + '</div>';
  }
  function heatColor(pct) {
    if (pct >= 95) return '#A6CE38';
    if (pct >= 85) return '#1FB2DE';
    if (pct >= 70) return '#FBAF17';
    return '#EC0677';
  }
  function heatTextColor(pct) {
    return (pct < 80) ? 'white' : '#0F385A';
  }

  /* ── generador HTML ── */
  var h = '';

  /* ===== CICLO ===== */
  (function(){
    h += '<div class="slide" id="slide-ciclo" data-title="Ciclo de la Estrategia"><div class="sf" style="background:white;display:flex;align-items:center;overflow:hidden;">';
    h += '<div style="width:30%;padding:0 28px 0 44px;flex-shrink:0;">';
    h += '<img src="./public/img/brand/logo-poli.jpg" style="height:50px;object-fit:contain;margin-bottom:32px;display:block;">';
    h += '<div style="font-weight:900;font-size:clamp(20px,2.8vw,40px);color:var(--navy);text-transform:uppercase;letter-spacing:2px;line-height:1.15;">Ciclo<br>de la<br>Estrategia</div>';
    h += '<div style="width:50px;height:4px;background:var(--cyan);border-radius:2px;margin:16px 0;"></div>';
    h += '<div style="font-size:clamp(8px,0.76vw,11px);color:#666;line-height:1.7;">Haz clic en cada etapa del ciclo para explorar su contenido.</div>';
    h += '</div>';
    h += '<div style="flex:1;display:flex;align-items:center;justify-content:center;height:100%;overflow:hidden;padding:12px 14px 12px 0;">';
    var cx=300,cy=300,Ro=252,Ri=112;
    var segs=[
      {n:'01',lines:['Análisis del','Contexto'],fill:'#1FB2DE',tc:'#0F385A',s:-88,e:-20,tgt:'analisis'},
      {n:'02',lines:['Definición y','aprobación de','metas y recursos'],fill:'#EC0677',tc:'white',s:-16,e:52,tgt:'avances'},
      {n:'03',lines:['Implementación','de planes y','proyectos'],fill:'#15BECE',tc:'#0F385A',s:56,e:124,tgt:'planes'},
      {n:'04',lines:['Seguimiento y','reporte de avance'],fill:'#A6CE38',tc:'#0F385A',s:128,e:196,tgt:'reporte'},
      {n:'05',lines:['Cierre de metas,','planes y proyectos'],fill:'#FBAF17',tc:'#0F385A',s:200,e:268,tgt:'balance'}
    ];
    var svg='<svg viewBox="0 0 600 600" style="width:100%;height:100%;max-height:calc(100vh - 20px);" xmlns="http://www.w3.org/2000/svg">';
    svg+='<defs><clipPath id="ciclo-cc"><circle cx="300" cy="300" r="108"/></clipPath><filter id="ciclo-sh" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-opacity="0.15"/></filter></defs>';
    svg+='<g filter="url(#ciclo-sh)">';
    segs.forEach(function(seg){
      var a1=seg.s*Math.PI/180,a2=seg.e*Math.PI/180,mid=((seg.s+seg.e)/2)*Math.PI/180;
      var x1=cx+Ro*Math.cos(a1),y1=cy+Ro*Math.sin(a1);
      var x2=cx+Ro*Math.cos(a2),y2=cy+Ro*Math.sin(a2);
      var x3=cx+Ri*Math.cos(a2),y3=cy+Ri*Math.sin(a2);

  /* ===== AVANCE DETAIL SLIDES (6 líneas) — NUEVO LAYOUT ===== */
  /* Función para parsear fecha DD/MM/YYYY a Date */
  function parseDate(dateStr) {
    if (!dateStr) return new Date();
    var parts = String(dateStr).split('/');
    if (parts.length === 3) {
      return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
    }
    return new Date();
  }

  /* Gantt timeline con escala de años */
  function ganttTimeline(nombre, fechaIni, fechaFin, yearColor, pctCompletado) {
    var dateStart = parseDate(fechaIni);
    var dateEnd = parseDate(fechaFin);

    // Escala: 2022-01-01 a 2026-12-31
    var scaleStart = new Date(2022, 0, 1);
    var scaleEnd = new Date(2026, 11, 31);
    var totalDays = (scaleEnd - scaleStart) / (1000 * 60 * 60 * 24);

    // Posición y ancho del proyecto
    var startOffset = Math.max(0, (dateStart - scaleStart) / (1000 * 60 * 60 * 24));
    var duration = Math.max(1, (dateEnd - dateStart) / (1000 * 60 * 60 * 24));

    var leftPct = (startOffset / totalDays) * 100;
    var widthPct = (duration / totalDays) * 100;
    var pct = parseInt(pctCompletado) || 0;

    return '<div style="margin-bottom:8px">'
      + '<div style="font-size:0.65em;color:#333;margin-bottom:2px">'+esc(nombre)+'</div>'
      + '<div style="background:#f0f0f0;border-radius:4px;height:24px;position:relative;border:1px solid #ddd;overflow:hidden">'
      + '<div style="position:absolute;left:'+leftPct+'%;width:'+widthPct+'%;height:100%;background:'+yearColor+';border-radius:3px;display:flex;align-items:center;justify-content:center">'
      + '<span style="font-size:0.5em;color:white;font-weight:700;white-space:nowrap;padding:0 2px">'+pct+'%</span>'
      + '</div>'
      + '</div>'
      + '</div>';
  }

  /* Mapeo de años a colores */
  var yearColors = {
    '2022': '#1a1a1a',  /* Negro */
    '2023': '#FBAF17',  /* Amarillo/Naranja */

    '2025': '#EC0677',  /* Rosa */
    '2026': '#A6CE38'   /* Verde */
  };

  /* Función para formatear valores con signo y decimales */
  function formatValue(value, signo, decimales) {
    if (!value && value !== 0 && value !== '0') return '—';

    var num = parseFloat(value) || 0;
    var dec = parseInt(decimales) || 0;
    var formatted = num.toFixed(dec);

    // Aplicar signo según tipo
    switch(String(signo).toUpperCase()) {
      case '%':
        return formatted + '%';
      case '$':
        return '$' + formatted;
      case 'DEC':
      case 'ENT':
      default:
        return formatted;
    }
  }

  /* Función auxiliar: CMI indicator row con signos y decimales */
  function cmiRow(indicador, meta, ejecucion, cumplimiento, metaSigno, ejecSigno, decMeta, decEjec) {

    var cumplPct = n * 100;

    var ejecFormato = formatValue(ejecucion, ejecSigno, decEjec);

    return '<tr style="border-bottom:1px solid #eee;height:30px">'
      + '<td style="padding:6px 8px;font-size:0.8em;color:#333">'+esc(indicador)+'</td>'
      + '<td style="padding:6px 8px;font-size:0.8em;text-align:right;color:#666">'+metaFormato+'</td>'
      + '<td style="padding:6px 8px;font-size:0.8em;text-align:right;color:#666">'+ejecFormato+'</td>'
      + '<td style="padding:6px 8px;font-size:0.8em;text-align:center;font-weight:700;color:'+cumplColor+'">'+Math.round(cumplPct)+'%</td>'
      + '</tr>';
  }

  h += '<div style="background:var(--navy);padding:13px 22px;flex-shrink:0;display:flex;align-items:center;gap:12px"><img src="./public/img/brand/logo-poli.jpg" style="height:28px"><span style="color:white;font-weight:900;font-size:clamp(12px,1.7vw,24px);text-transform:uppercase;letter-spacing:2px">Cierre Año 2025</span></div>';
  h += '<div style="flex:1;display:flex;align-items:center;justify-content:center;gap:28px;padding:22px 40px;background:#f8fafe">';
  h += '<div onclick="window.open(\'https://www.youtube.com/watch?v=2dFsBLSEp7c&t=294s\',\'_blank\')" style="flex:1;max-width:390px;background:white;border-radius:18px;overflow:hidden;cursor:pointer;box-shadow:0 6px 24px rgba(15,56,90,0.14);transition:transform 0.2s;border:2px solid #eef2f7" onmouseenter="this.style.transform=\'scale(1.03)\'" onmouseleave="this.style.transform=\'scale(1)\'"><div style="background:var(--navy);padding:14px 18px;display:flex;align-items:center;gap:10px"><span style="font-size:1.3em">▶️</span><div><div style="color:white;font-weight:900;font-size:0.88em;text-transform:uppercase">Balance Institucional POLI 2025</div><div style="color:var(--cyan);font-size:0.67em;margin-top:1px">Video oficial — YouTube</div></div></div><div style="height:170px;background:linear-gradient(135deg,#0F385A,#1FB2DE);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px"><div style="width:60px;height:60px;background:rgba(255,255,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8em;border:3px solid rgba(255,255,255,0.4)">▶</div><div style="color:white;font-size:0.77em;opacity:0.85;letter-spacing:0.8px">Clic para ver en YouTube</div></div><div style="padding:12px 16px"><div style="font-weight:800;color:var(--navy);font-size:0.83em">Balance Institucional POLI 2025</div><div style="font-size:0.68em;color:#888;margin-top:2px">YouTube · Politécnico Grancolombiano</div></div></div>';
  h += '<div onclick="window.open(\'https://www.poli.edu.co/informes-de-sostenibilidad-institucional\',\'_blank\')" style="flex:1;max-width:390px;background:white;border-radius:18px;overflow:hidden;cursor:pointer;box-shadow:0 6px 24px rgba(15,56,90,0.14);transition:transform 0.2s;border:2px solid #eef2f7" onmouseenter="this.style.transform=\'scale(1.03)\'" onmouseleave="this.style.transform=\'scale(1)\'"><div style="background:var(--cyan);padding:14px 18px;display:flex;align-items:center;gap:10px"><span style="font-size:1.3em">📑</span><div><div style="color:var(--navy);font-weight:900;font-size:0.88em;text-transform:uppercase">Informe de Sostenibilidad</div><div style="color:var(--navy);font-size:0.67em;margin-top:1px;opacity:0.8">Planeación y Gestión Institucional</div></div></div><div style="height:170px;background:linear-gradient(135deg,#1FB2DE,#15BECE);display:flex;align-items:center;justify-content:center"><img src="./public/img/brand/balance.png" style="max-width:100%;max-height:100%;object-fit:contain"></div><div style="padding:12px 16px"><div style="font-weight:800;color:var(--navy);font-size:0.83em">Informe de Sostenibilidad</div><div style="font-size:0.68em;color:#888;margin-top:2px">Politécnico Grancolombiano</div></div></div>';
  h += '</div></div></div>';

  /* ===== ORGULLOSAMENTE ===== */
  h += '<div class="slide" id="slide-orgullosamente" data-title="Orgullosamente Poli"><div class="sf" style="background:linear-gradient(135deg,#0F385A,#EC0677);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;padding:40px;position:relative">';
  h += '<img src="./public/img/brand/logo-poli.jpg" style="width:clamp(80px,12vw,160px);height:auto;margin-bottom:8px;filter:brightness(10);position:relative;">';
  h += '<div style="font-size:clamp(24px,3.6vw,48px);font-weight:900;color:white;letter-spacing:2px;line-height:1.05;position:relative">SOMOS DIFERENTES,<br><span style="color:var(--yellow)">#SOMOS POLI.</span></div>';
  h += '<div style="color:rgba(255,255,255,0.75);font-size:clamp(11px,1.1vw,15px);line-height:1.7;max-width:500px;position:relative">Una institución universitaria que transforma vidas, genera impacto positivo y lidera la educación superior con excelencia, pasión y originalidad.</div>';
  h += '</div></div>';

  /* ── mount ── */
  document.getElementById('main').insertAdjacentHTML('beforeend', h);
  /* Modales en body para que no los oculte el display:none del slide padre */
  document.body.insertAdjacentHTML('beforeend', mh);

  /* ── navegación ── */
  var slideHistory = [];
  var currentSlide = 'slide-home';

  function animarBarras(el) {
    el.querySelectorAll('.bar-fill').forEach(function (bar) {
      var pct = bar.getAttribute('data-pct') || 0;
      setTimeout(function () { bar.style.width = pct + '%'; }, 60);
    });
  }
  function animarTimeline(el) {
    el.querySelectorAll('.tl-fill').forEach(function (bar) {
      var pct = bar.getAttribute('data-pct') || 0;
      setTimeout(function () { bar.style.width = pct + '%'; }, 60);
    });
  }

  window.goTo = function (id) {
    var el = document.getElementById('slide-' + id);
    if (!el) return;
    slideHistory.push(currentSlide);
    document.querySelectorAll('.slide.active').forEach(function (s) { s.classList.remove('active'); });
    el.classList.add('active');
    currentSlide = 'slide-' + id;
    updateNav();
    animarBarras(el);
    if (id === 'proyectos') animarTimeline(el);
  };
  window.goHome = function () {
    slideHistory = [];
    document.querySelectorAll('.slide.active').forEach(function (s) { s.classList.remove('active'); });
    document.getElementById('slide-home').classList.add('active');
    currentSlide = 'slide-home';
    updateNav();
  };
  window.goBack = function () {
    if (!slideHistory.length) { goHome(); return; }
    var prev = slideHistory.pop();
    document.querySelectorAll('.slide.active').forEach(function (s) { s.classList.remove('active'); });
    document.getElementById(prev).classList.add('active');
    currentSlide = prev;
    updateNav();
    animarBarras(document.getElementById(prev));
  };
  function updateNav() {
    document.getElementById('btn-home').disabled = (currentSlide === 'slide-home');
    document.getElementById('btn-back').disabled = (slideHistory.length === 0);
  }

  window.togglePestel = function (btn) {
    var clicked = btn.nextElementSibling;
    document.querySelectorAll('#slide-pestel .pestel-body').forEach(function (el) {
      if (el !== clicked) el.style.display = 'none';
    });
    clicked.style.display = clicked.style.display === 'none' ? 'block' : 'none';
  };
  window.toggleLogros = function (id) {
    var el = document.getElementById(id);
    if (!el) return;
    var btn = el.previousElementSibling;
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
    if (btn) btn.querySelector('span:last-child').textContent = el.style.display === 'none' ? '▼' : '▲';
  };

  window.logro_next = function (carouselId) {
    var imgs = document.querySelectorAll('.' + carouselId + '-img');
    if (imgs.length === 0) return;
    var current = 0;
    imgs.forEach(function(img, idx) {
      if (parseFloat(img.style.opacity) === 1) current = idx;
    });
    var next = (current + 1) % imgs.length;
    imgs[current].style.opacity = '0';
    imgs[next].style.opacity = '1';
    var counter = document.getElementById(carouselId + '-counter');
    if (counter) counter.textContent = (next + 1) + ' de ' + imgs.length;
  };

  window.logro_prev = function (carouselId) {
    var imgs = document.querySelectorAll('.' + carouselId + '-img');
    if (imgs.length === 0) return;
    var current = 0;
    imgs.forEach(function(img, idx) {
      if (parseFloat(img.style.opacity) === 1) current = idx;
    });
    var prev = (current - 1 + imgs.length) % imgs.length;
    imgs[current].style.opacity = '0';
    imgs[prev].style.opacity = '1';
    var counter = document.getElementById(carouselId + '-counter');
    if (counter) counter.textContent = (prev + 1) + ' de ' + imgs.length;
  };

  /* ── Pestañas por línea estratégica ── */
  window.setProjTab = function (lineId) {
    var slide = document.getElementById('slide-proyectos');
    if (!slide) return;
    /* ocultar todos los paneles */
    slide.querySelectorAll('.proy-tab-panel').forEach(function(p){ p.style.display='none'; });
    /* desactivar todos los botones */
    slide.querySelectorAll('.proy-tab-btn').forEach(function(b){
      b.classList.remove('active');
      var lc = b.getAttribute('data-lc') || '#0F385A';
      b.style.background = 'white';
      b.style.color = lc;
      b.style.borderBottomColor = 'transparent';
    });
    /* activar panel */
    var panel = document.getElementById('proy-tab-'+lineId);
    if (panel) panel.style.display = 'block';
    /* activar botón */
    var btn = document.getElementById('proy-tb-'+lineId);
    if (btn) {
      btn.classList.add('active');
      var lc = btn.getAttribute('data-lc') || '#0F385A';
      btn.style.background = lc;
      /* contraste texto */
      var lightColors = ['#FBAF17','#1FB2DE','#15BECE','#A6CE38'];
      btn.style.color = lightColors.indexOf(lc) >= 0 ? 'var(--navy)' : 'white';
      btn.style.borderBottomColor = lc;
    }
  };

  window.setProyView = function (view) {
    var grid = document.getElementById('proy-grid-view');
    var tl   = document.getElementById('proy-tl-view');
    var btnG = document.getElementById('btn-proy-grid');
    var btnT = document.getElementById('btn-proy-tl');
    /* las pestañas de línea sólo tienen sentido en vista grid */
    var tabs = document.querySelector('#slide-proyectos .proy-tabs-row');
    if (view === 'grid') {
      grid.style.display = ''; tl.style.display = 'none';
      btnG.classList.add('active'); btnT.classList.remove('active');
      if (tabs) tabs.style.display = 'flex';
    } else {
      grid.style.display = 'none'; tl.style.display = 'flex';
      btnT.classList.add('active'); btnG.classList.remove('active');
      if (tabs) tabs.style.display = 'none';
    }
  };

  window.setYearTab = function (slideId, year) {
    /* Mapeo lineId -> nombres en Excel */
    var lineaMapNames = {
      'calidad': { pmo: 'Calidad', cmi: 'Calidad' },
      'educacion': { pmo: 'Educación', cmi: 'Educación_para_toda_la_vida' },
      'expansion': { pmo: 'Expansión', cmi: 'Expansión' },
      'experiencia': { pmo: 'Experiencia', cmi: 'Experiencia' },
      'transformacion': { pmo: 'Transformación', cmi: 'Transformación_Organizacional' },
      'sostenibilidad': { pmo: 'Sostenibilidad', cmi: 'Sostenibilidad' }
    };

    /* Actualizar estilo de tabs: active vs inactive */
    var tabs = document.querySelectorAll('#tabs-' + slideId + ' button');
    tabs.forEach(function(t) {
      if (t.dataset.year == year) {
        t.style.background = '#0F385A';
        t.style.opacity = '1';
        t.style.fontWeight = '900';
        t.style.boxShadow = '0 2px 8px rgba(0,0,0,0.2)';
      } else {
        t.style.background = '#0F385A';
        t.style.opacity = '0.5';
        t.style.fontWeight = '700';
        t.style.boxShadow = 'none';
      }
    });

    /* Re-renderizar Gantt */
    var container = document.getElementById('gantt-' + slideId);
    var slideIdBase = slideId.replace('-avance','');
    var lineaIdMap = {'cal':'calidad','exp':'expansion','edu':'educacion','exp2':'experiencia','to':'transformacion','sos':'sostenibilidad'};
    var linea = lineaIdMap[slideIdBase];
    var pmoBuscar = (lineaMapNames[linea] && lineaMapNames[linea].pmo) || linea;

    var proyectos_pmo = window.PDI_DATA.proyectos_pmo || [];
    var rows = proyectos_pmo.filter(function(p) {
      var lineaProy = String(p['4. Líneas estratégicas']||'').toLowerCase();
      var finParts = String(p.Fin||'').split('/');
      var yearProj = finParts[2] || '';
      return lineaProy.includes(pmoBuscar.toLowerCase()) && yearProj === String(year);
    });

    if (rows.length) {
      var lineColorMap = {'calidad':'#EC0677','educacion':'#0F385A','expansion':'#FBAF17','experiencia':'#1FB2DE','transformacion':'#15BECE','sostenibilidad':'#A6CE38'};
      var lineColor = lineColorMap[linea]||'#0F385A';
      var html = '';
      rows.slice(0,3).forEach(function(p) {
        var pct_comp = String(p['% completado']||'0').replace('%','');
        var fechaIni = p.Comienzo || '';
        var fechaFin = p.Fin || '';
        html += '<div style="margin:4px 0">'
          + '<div style="font-size:0.6em;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px">'+p['Nombre del proyecto']+'</div>'
          + '<div style="background:#e8eef5;border-radius:4px;height:14px;position:relative;overflow:hidden">'
          + '<div style="background:'+lineColor+';height:100%;border-radius:4px;width:'+pct_comp+'%;transition:width 0.3s ease;display:flex;align-items:center;justify-content:center"><span style="font-size:0.45em;color:white;font-weight:700;padding:0 4px">'+pct_comp+'%</span></div>'
          + '</div>'
          + '<div style="font-size:0.55em;color:#666;margin-top:1px;text-align:right">'+fechaIni+' – '+fechaFin+'</div>'
          + '</div>';
      });
      container.innerHTML = html;
    } else {
      container.innerHTML = '<div style="color:#aaa;font-size:0.65em;padding:8px">Sin proyectos en '+year+'</div>';
    }
  };

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') goBack();
    if (e.key === 'h' || e.key === 'H') goHome();
  });

  /* ── títulos home desde datos ── */
  if (cfg.nombre)   document.getElementById('home-title').textContent    = cfg.nombre;
  if (cfg.subtitulo) document.getElementById('home-subtitle').textContent = cfg.subtitulo;

})();
</script>
</body>
</html>
