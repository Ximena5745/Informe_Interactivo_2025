<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Informe de Cierre PDI 2025 — Planeación y Gestión Institucional</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="./data-bundle.js"></script>
<style>
/* === Reset === */
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f0f4f8;font-family:'Montserrat',sans-serif;overflow:hidden;height:100vh;display:flex;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(15,56,90,0.3);border-radius:4px;}

/* === Variables === */
:root{
  --navy:#0F385A;--cyan:#1FB2DE;--pink:#EC0677;
  --green:#A6CE38;--yellow:#FBAF17;--teal:#15BECE;
}

/* === Sidebar nav === */
#snav{position:fixed;left:0;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;padding:8px;background:rgba(15,56,90,0.95);backdrop-filter:blur(10px);border-radius:0 12px 12px 0;border:1px solid rgba(31,178,222,0.3);border-left:none;z-index:300;}
#snav button{background:rgba(31,178,222,0.15);border:1px solid rgba(31,178,222,0.4);color:white;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:0.95em;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
#snav button:hover{background:rgba(31,178,222,0.45);border-color:#1FB2DE;}
#snav button:disabled{opacity:0.2;cursor:default;}

/* === Layout === */
#main{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.slide{display:none;position:absolute;inset:0;align-items:center;justify-content:center;}
.slide.active{display:flex;animation:fi 0.3s ease;}
@keyframes fi{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
.sf{width:min(100vw,calc(100vh*16/9));height:100vh;max-height:100vh;position:relative;overflow:hidden;background:white;}

/* === Home buttons === */
.btn-nav{border:none;border-radius:10px;padding:10px 8px;cursor:pointer;font-family:inherit;font-weight:800;font-size:clamp(10px,0.9vw,13px);letter-spacing:0.3px;text-transform:uppercase;line-height:1.4;text-align:center;width:100%;flex:1;min-height:0;box-shadow:0 2px 8px rgba(0,0,0,0.15);transition:transform 0.15s;}
.btn-nav:hover{transform:scale(1.04);}

/* ===================================================================
   ESFERA: blanca, centro medido px=(316,325)=44%,44% en 721×735
   Banda scrolling con fondo BLANCO → movimiento visible sin efecto moneda
   =================================================================== */
.esfera{
  position:absolute;
  left:51.9%;top:47.9%;          /* centro px=(374,352) en 721×735 */
  transform:translate(-50%,-50%);
  width:28%;aspect-ratio:1/1;
  border-radius:50%;
  overflow:hidden;
  /* Gradiente base: blanco puro → gris claro → gris medio (efecto esférico 3D) */
  background:radial-gradient(circle at 38% 32%,#ffffff 0%,#f2eff2 38%,#d0cdd0 75%,#b8b5b8 100%);
  box-shadow:
    inset 0 -8px 18px rgba(0,30,80,0.1),
    inset 3px 3px 10px rgba(255,255,255,0.9),
    0 5px 18px rgba(0,0,0,0.18),
    0 0 0 2px rgba(255,255,255,0.95);
  z-index:3;
}
/* Banda de 3 caras que scrollea — es lo que da apariencia de esfera (no disco):
   el CONTENIDO se mueve bajo una luz FIJA = efecto esfera girando */
.esfera-banda{
  position:absolute;top:0;left:0;height:100%;
  width:300%;
  display:flex;
  animation:girar-esfera 8s linear infinite;
}
.esfera-cara{
  flex:1;height:100%;
  /* Igual al color interior del círculo de Comunidad.png: R=245 G=241 B=244 */
  background:#f5f1f4;
  overflow:hidden;
  position:relative;
}
/* Comunidad.png tiene fondo transparente — no necesita blend mode.
   Escala al 160% para que el círculo ocupe ~87% del diámetro de la esfera */
.cara-icon img{
  position:absolute;
  width:160%;height:auto;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
}
/* logo-poli.jpg es 1225×596 (muy landscape) — contain para ver completo,
   multiply elimina el fondo blanco del JPG */
.cara-logo img{
  position:absolute;
  width:88%;height:auto;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  mix-blend-mode:multiply;
}
/* Sombra de curvatura en bordes — FIJA, da la ilusión de profundidad esférica */
.esfera-curva{
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 50% 50%,transparent 36%,rgba(0,20,60,0.14) 58%,rgba(0,20,60,0.50) 82%,rgba(0,20,60,0.68) 100%),
    radial-gradient(ellipse 28% 100% at 0%   50%,rgba(0,20,60,0.18) 0%,transparent 100%),
    radial-gradient(ellipse 28% 100% at 100% 50%,rgba(0,20,60,0.10) 0%,transparent 100%),
    radial-gradient(ellipse 100% 22% at 50% 100%,rgba(0,20,60,0.18) 0%,transparent 100%);
  z-index:2;pointer-events:none;
}
/* Reflejo especular FIJO en arriba-izquierda — luz real no rota con la esfera */
.esfera-luz{
  position:absolute;
  width:32%;height:26%;
  top:7%;left:9%;
  border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,255,255,0.96) 0%,rgba(255,255,255,0.65) 35%,transparent 68%);
  pointer-events:none;z-index:4;
}
@keyframes girar-esfera{
  from{transform:translateX(0%)}
  to  {transform:translateX(-66.66%)}
}

/* === Animated bars === */
.bar-row{display:flex;align-items:center;gap:10px;margin:4px 0;}
.bar-label{font-size:0.65em;font-weight:800;color:#555;text-transform:uppercase;width:110px;flex-shrink:0;text-align:right;}
.bar-track{background:rgba(0,0,0,0.08);border-radius:8px;height:18px;overflow:hidden;flex:1;}
.bar-fill{height:100%;border-radius:8px;width:0%;transition:width 0.9s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;}
.bar-fill span{color:white;font-size:0.68em;font-weight:900;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,0.3);}

/* === Gauge row === */
.gauge-row{display:flex;justify-content:center;gap:24px;flex-shrink:0;border-bottom:2px solid #eef2f7;padding:16px 24px;background:white;}

/* === Dark slide header === */
.sh-dark{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:13px 22px;}
.sh-dark span.tt{color:white;font-weight:900;font-size:clamp(11px,1.6vw,21px);text-transform:uppercase;letter-spacing:1px;}

/* === Heatmap === */
.hm-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:5px;align-items:center;}
.hm-head{font-size:0.68em;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:0.5px;padding:6px 10px;text-align:center;border-radius:6px;}
.hm-name{font-size:0.78em;font-weight:800;color:var(--navy);padding:6px 8px;}
.hm-cell{border-radius:8px;padding:8px 6px;text-align:center;font-weight:900;font-size:0.85em;}

/* === Timeline === */
.tl-bar-wrap{display:flex;align-items:center;gap:8px;margin:3px 0;}
.tl-label{font-size:0.62em;font-weight:700;color:#555;width:180px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-track{flex:1;background:#eef2f7;border-radius:6px;height:14px;overflow:hidden;}
.tl-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;transition:width 0.8s ease;}
.tl-fill span{color:white;font-size:0.6em;font-weight:900;white-space:nowrap;}
.tl-pct{font-size:0.6em;font-weight:900;width:30px;text-align:right;flex-shrink:0;}
.toggle-btns{display:flex;gap:6px;margin-left:auto;}
.toggle-btns button{border:2px solid #ccc;background:white;color:#555;border-radius:8px;padding:5px 14px;cursor:pointer;font-family:inherit;font-weight:700;font-size:0.72em;transition:all 0.15s;}
.toggle-btns button.active{background:var(--navy);color:white;border-color:var(--navy);}
</style>
</head>
<body>

<div id="snav">
  <button id="btn-home" onclick="goHome()" disabled title="Inicio">🏠</button>
  <button id="btn-back" onclick="goBack()" disabled title="Volver">←</button>
</div>

<div id="main">

<!-- ===== HOME ===== -->
<div class="slide active" id="slide-home" data-title="Inicio">
<div class="sf" style="display:flex;flex-direction:column;overflow:hidden;">

  <div style="padding:10px 20px 8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;">
    <div style="text-align:center;">
      <div style="color:var(--navy);font-size:clamp(16px,2.2vw,30px);font-weight:900;text-transform:uppercase;letter-spacing:2px;" id="home-title">Informe de Cierre PDI 2025</div>
      <div style="color:var(--cyan);font-size:clamp(8px,0.78vw,11px);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:2px;" id="home-subtitle">Planeación y Gestión Institucional</div>
    </div>
    <img src="./public/img/brand/logo-poli.jpg" style="position:absolute;right:20px;top:50%;transform:translateY(-50%);height:54px;object-fit:contain;">
  </div>

  <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:10px;padding:4px 12px 8px;min-height:0;overflow:hidden;">

    <!-- LEFT: 3 buttons -->
    <div style="width:150px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;height:min(calc(100vh - 108px),460px);">
      <button onclick="goTo('ciclo')"   class="btn-nav" style="background:var(--pink);color:white;">Ciclo de la<br>Estrategia</button>
      <button onclick="goTo('avances')" class="btn-nav" style="background:var(--green);color:var(--navy);">Avance Líneas<br>Estratégicas</button>
      <button onclick="goTo('logros')"  class="btn-nav" style="background:var(--cyan);color:var(--navy);">Logros por<br>Línea Estratégica</button>
    </div>

    <!-- CENTER: flower diagram + esfera giratoria -->
    <div style="position:relative;height:min(calc(100vh - 108px),460px);aspect-ratio:721/735;flex-shrink:0;">
      <img src="./public/img/brand/lineas-estrategicas.jpg" style="width:100%;height:100%;">
      <!-- Círculo blanco cubre ícono original (centro medido px=(374,352)=51.9%×47.9%) -->
      <svg viewBox="0 0 721 735" style="position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;">
        <circle cx="374" cy="352" r="105" fill="white"/>
      </svg>
      <!-- Esfera: Comunidad (frente) → Logo Poli (dorso) → Comunidad (loop) -->
      <div class="esfera">
        <div class="esfera-banda">
          <div class="esfera-cara cara-icon"><img src="./PDI/Comunidad.png" alt="Comunidad Universitaria"></div>
          <div class="esfera-cara cara-logo"><img src="./public/img/brand/logo-poli.jpg" alt="Logo Poli"></div>
          <div class="esfera-cara cara-icon"><img src="./PDI/Comunidad.png" alt="Comunidad Universitaria"></div>
        </div>
        <div class="esfera-curva"></div>
        <div class="esfera-luz"></div>
      </div>
      <!-- Petales clickeables — coords escaladas a 721×735 -->
      <svg viewBox="0 0 721 735" style="position:absolute;inset:0;width:100%;height:100%;z-index:4;pointer-events:none;">
        <ellipse cx="72"  ry="180" cy="303" rx="59"  fill="rgba(0,0,0,0.001)" style="cursor:pointer;pointer-events:all" onclick="goTo('cal-avance')"/>
        <ellipse cx="611" ry="117" cy="236" rx="100" fill="rgba(0,0,0,0.001)" style="cursor:pointer;pointer-events:all" onclick="goTo('exp-avance')"/>
        <ellipse cx="193" ry="69"  cy="605" rx="103" fill="rgba(0,0,0,0.001)" style="cursor:pointer;pointer-events:all" onclick="goTo('edu-avance')"/>
        <ellipse cx="594" ry="105" cy="487" rx="95"  fill="rgba(0,0,0,0.001)" style="cursor:pointer;pointer-events:all" onclick="goTo('exp2-avance')"/>
        <ellipse cx="462" ry="200" cy="656" rx="86"  fill="rgba(0,0,0,0.001)" style="cursor:pointer;pointer-events:all" onclick="goTo('to-avance')"/>
        <ellipse cx="489" ry="200" cy="12"  rx="75"  fill="rgba(0,0,0,0.001)" style="cursor:pointer;pointer-events:all" onclick="goTo('sos-avance')"/>
      </svg>
    </div>

    <!-- RIGHT: 4 buttons -->
    <div style="width:150px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;height:min(calc(100vh - 108px),460px);">
      <button onclick="goTo('planes')"        class="btn-nav" style="background:var(--navy);color:white;">Planes Anuales<br>de Retos</button>
      <button onclick="goTo('proyectos')"     class="btn-nav" style="background:#42F2F2;color:var(--navy);">Proyectos<br>Estratégicos</button>
      <button onclick="goTo('balance')"       class="btn-nav" style="background:var(--teal);color:var(--navy);">Balance<br>Institucional</button>
      <button onclick="goTo('orgullosamente')"class="btn-nav" style="background:var(--yellow);color:var(--navy);">Orgullosamente<br>Poli</button>
    </div>

  </div>
</div>
</div><!-- /HOME -->

</div><!-- /#main -->

<script>
(function () {
  var D = window.PDI_DATA;
  if (!D) {
    document.getElementById('main').innerHTML = '<div style="padding:40px;text-align:center"><h1>Error</h1><p>No se encontró data-bundle.js</p></div>';
    return;
  }

  /* ── datos ── */
  var cfg = {};
  (D.config || []).forEach(function (r) {
    if (r.seccion === 'general' || r.seccion === 'branding') cfg[r.clave] = r.valor;
  });
  var paleta = {};
  (D.config || []).forEach(function (r) {
    if (r.seccion === 'paleta') paleta[r.clave] = r.valor;
  });
  var avance   = D.avance    || [];
  var foda     = D.foda      || [];
  var pestel   = D.pestel    || [];
  var proy     = D.proyectos || [];
  var obj      = D.objetivos || [];
  var unidades = D.unidades  || [];

  var avMap = {};
  avance.forEach(function (a) { avMap[a.id] = a; });

  var colorMap = {
    calidad:        paleta.pink   || '#EC0677',
    educacion:      paleta.navy   || '#0F385A',
    expansion:      paleta.yellow || '#FBAF17',
    experiencia:    paleta.cyan   || '#1FB2DE',
    transformacion: paleta.teal   || '#15BECE',
    sostenibilidad: paleta.green  || '#A6CE38'
  };
  var lineNameMap = {
    calidad: 'Calidad',
    educacion: 'Educación para Toda la Vida',
    expansion: 'Expansión',
    experiencia: 'Experiencia',
    transformacion: 'Transformación Organizacional',
    sostenibilidad: 'Sostenibilidad'
  };

  var lineIds       = ['calidad','educacion','expansion','experiencia','transformacion','sostenibilidad'];
  var slideSuffixes = ['cal-avance','edu-avance','exp-avance','exp2-avance','to-avance','sos-avance'];
  var lineColors    = [
    paleta.pink   || '#EC0677',
    paleta.navy   || '#0F385A',
    paleta.yellow || '#FBAF17',
    paleta.cyan   || '#1FB2DE',
    paleta.teal   || '#15BECE',
    paleta.green  || '#A6CE38'
  ];
  var lineNames = [
    'Calidad','Educación para Toda la Vida','Expansión',
    'Experiencia','Transformación Organizacional','Sostenibilidad'
  ];

  /* ── helpers ── */
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function gauge(pct, color, label) {
    var c = Math.round(pct * 2.39);
    return '<svg viewBox="0 0 100 100" style="width:80px;height:80px">'
      + '<circle cx="50" cy="50" r="38" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="8"/>'
      + '<circle cx="50" cy="50" r="38" fill="none" stroke="'+esc(color)+'" stroke-width="8"'
      + ' stroke-dasharray="'+c+' 239" stroke-linecap="round" transform="rotate(-90 50 50)"/>'
      + '<text x="50" y="46" text-anchor="middle" font-size="18" font-weight="900" fill="#0F385A" font-family="Montserrat,sans-serif">'+pct+'%</text>'
      + '<text x="50" y="60" text-anchor="middle" font-size="8"  font-weight="700" fill="#666"   font-family="Montserrat,sans-serif">'+esc(label)+'</text>'
      + '</svg>';
  }
  function barRow(label, pct, color) {
    return '<div class="bar-row">'
      + '<div class="bar-label">'+esc(label)+'</div>'
      + '<div class="bar-track"><div class="bar-fill" data-pct="'+pct+'" style="background:'+esc(color)+'"><span>'+pct+'%</span></div></div>'
      + '</div>';
  }
  function heatColor(pct) {
    if (pct >= 95) return '#A6CE38';
    if (pct >= 85) return '#1FB2DE';
    if (pct >= 70) return '#FBAF17';
    return '#EC0677';
  }
  function heatTextColor(pct) {
    return (pct < 80) ? 'white' : '#0F385A';
  }

  /* ── generador HTML ── */
  var h = '';

  /* ===== CICLO ===== */
  (function(){
    h += '<div class="slide" id="slide-ciclo" data-title="Ciclo de la Estrategia"><div class="sf" style="background:white;display:flex;align-items:center;overflow:hidden;">';
    h += '<div style="width:30%;padding:0 28px 0 44px;flex-shrink:0;">';
    h += '<img src="./public/img/brand/logo-poli.jpg" style="height:50px;object-fit:contain;margin-bottom:32px;display:block;">';
    h += '<div style="font-weight:900;font-size:clamp(20px,2.8vw,40px);color:var(--navy);text-transform:uppercase;letter-spacing:2px;line-height:1.15;">Ciclo<br>de la<br>Estrategia</div>';
    h += '<div style="width:50px;height:4px;background:var(--cyan);border-radius:2px;margin:16px 0;"></div>';
    h += '<div style="font-size:clamp(8px,0.76vw,11px);color:#666;line-height:1.7;">Haz clic en cada etapa del ciclo para explorar su contenido.</div>';
    h += '</div>';
    h += '<div style="flex:1;display:flex;align-items:center;justify-content:center;height:100%;overflow:hidden;padding:12px 14px 12px 0;">';
    var cx=300,cy=300,Ro=252,Ri=112;
    var segs=[
      {n:'01',lines:['Análisis del','Contexto'],fill:'#1FB2DE',tc:'#0F385A',s:-88,e:-20,tgt:'analisis'},
      {n:'02',lines:['Definición y','aprobación de','metas y recursos'],fill:'#EC0677',tc:'white',s:-16,e:52,tgt:'avances'},
      {n:'03',lines:['Implementación','de planes y','proyectos'],fill:'#15BECE',tc:'#0F385A',s:56,e:124,tgt:'planes'},
      {n:'04',lines:['Seguimiento y','reporte de avance'],fill:'#A6CE38',tc:'#0F385A',s:128,e:196,tgt:'reporte'},
      {n:'05',lines:['Cierre de metas,','planes y proyectos'],fill:'#FBAF17',tc:'#0F385A',s:200,e:268,tgt:'balance'}
    ];
    var svg='<svg viewBox="0 0 600 600" style="width:100%;height:100%;max-height:calc(100vh - 20px);" xmlns="http://www.w3.org/2000/svg">';
    svg+='<defs><clipPath id="ciclo-cc"><circle cx="300" cy="300" r="108"/></clipPath><filter id="ciclo-sh" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-opacity="0.15"/></filter></defs>';
    svg+='<g filter="url(#ciclo-sh)">';
    segs.forEach(function(seg){
      var a1=seg.s*Math.PI/180,a2=seg.e*Math.PI/180,mid=((seg.s+seg.e)/2)*Math.PI/180;
      var x1=cx+Ro*Math.cos(a1),y1=cy+Ro*Math.sin(a1);
      var x2=cx+Ro*Math.cos(a2),y2=cy+Ro*Math.sin(a2);
      var x3=cx+Ri*Math.cos(a2),y3=cy+Ri*Math.sin(a2);
      var x4=cx+Ri*Math.cos(a1),y4=cy+Ri*Math.sin(a1);
      var laf=(seg.e-seg.s>180)?1:0;
      var d='M '+x1+','+y1+' A '+Ro+','+Ro+' 0 '+laf+',1 '+x2+','+y2+' L '+x3+','+y3+' A '+Ri+','+Ri+' 0 '+laf+',0 '+x4+','+y4+' Z';
      svg+='<g onclick="goTo(\''+seg.tgt+'\')" onmouseenter="this.firstElementChild.setAttribute(\'opacity\',\'0.82\')" onmouseleave="this.firstElementChild.removeAttribute(\'opacity\')" style="cursor:pointer">';
      svg+='<path d="'+d+'" fill="'+seg.fill+'" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>';
      var na=(seg.e-20)*Math.PI/180,nr=134,nx=cx+nr*Math.cos(na),ny=cy+nr*Math.sin(na);
      svg+='<text x="'+nx+'" y="'+ny+'" text-anchor="middle" dominant-baseline="middle" font-family="Montserrat,sans-serif" font-weight="900" font-size="26" fill="white" stroke="rgba(0,0,0,0.18)" stroke-width="2" paint-order="stroke">'+seg.n+'</text>';
      var lr=192,lx=cx+lr*Math.cos(mid),ly=cy+lr*Math.sin(mid);
      var lh=14,sy=ly-(seg.lines.length-1)*lh/2;
      seg.lines.forEach(function(line,i){
        svg+='<text x="'+lx+'" y="'+(sy+i*lh)+'" text-anchor="middle" dominant-baseline="middle" font-family="Montserrat,sans-serif" font-weight="800" font-size="12" fill="'+seg.tc+'">'+line+'</text>';
      });
      svg+='</g>';
    });
    svg+='</g>';
    svg+='<image href="./public/img/brand/lineas-estrategicas.jpg" x="192" y="192" width="216" height="216" clip-path="url(#ciclo-cc)" preserveAspectRatio="xMidYMid slice"/>';
    svg+='<circle cx="300" cy="300" r="108" fill="none" stroke="white" stroke-width="4"/>';
    svg+='<circle cx="300" cy="300" r="253" fill="none" stroke="#e8edf2" stroke-width="1.5"/>';
    svg+='</svg>';
    h+=svg;
    h+='</div>';

    }
  };

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') goBack();
    if (e.key === 'h' || e.key === 'H') goHome();
  });

  /* ── títulos home desde datos ── */
  if (cfg.nombre)   document.getElementById('home-title').textContent    = cfg.nombre;
  if (cfg.subtitulo) document.getElementById('home-subtitle').textContent = cfg.subtitulo;

})();
</script>
</body>
</html>
